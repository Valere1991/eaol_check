events {}
http {
  upstream operate_upstream { server operate:8080; }
  upstream tasklist_upstream { server tasklist:8080; }

  server {
    listen 8080;
    auth_basic "EAOL Camunda Local";
    auth_basic_user_file /etc/nginx/conf.d/camunda-basic-auth.htpasswd;

    location /operate/ {
      proxy_pass http://operate_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /tasklist/ {
      proxy_pass http://tasklist_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      return 200 'EAOL Camunda local proxy. Use /operate/ or /tasklist/. Login: admin/admin\n';
      add_header Content-Type text/plain;
    }
  }
}
